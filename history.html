<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OfficePong - Storico Partite</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body class="bg-slate-50 text-slate-800 font-sans antialiased min-h-screen">

    <nav class="bg-white border-b border-slate-200 py-4 px-6 sticky top-0 z-10 shadow-xs">
        <div class="max-w-3xl mx-auto flex justify-between items-center">
            <a href="index.html" class="text-xl font-bold text-slate-900 flex items-center gap-2 no-underline">
                🏓 <span class="text-emerald-600">Office</span>Pong
            </a>
            <div class="flex items-center gap-6 text-sm font-medium">
                <a href="index.html" class="text-slate-600 hover:text-emerald-600 transition-colors">Classifica</a>
                <a href="history.html" class="text-emerald-600 font-semibold">Storico Partite</a>
                <button onclick="signOut()" class="px-3 py-2 rounded-lg border border-slate-200 text-slate-600 hover:text-rose-600 hover:border-rose-200 hover:bg-rose-50 transition-colors">Esci</button>
            </div>
        </div>
    </nav>

    <main class="max-w-3xl mx-auto p-4 md:p-8">
        <div class="bg-white rounded-2xl border border-slate-200 shadow-xs overflow-hidden">
            <div class="p-6 border-b border-slate-100 flex justify-between items-center">
                <h2 class="text-lg font-semibold text-slate-900">Tutti i Match Giocati</h2>
                <span id="matchCount" class="text-xs bg-slate-100 text-slate-600 px-2.5 py-1 rounded-md font-medium">0 match</span>
            </div>
            
            <div class="divide-y divide-slate-100" id="historyList">
                <p class="p-6 text-center text-slate-400">Caricamento storico...</p>
            </div>
        </div>
    </main>

    <script src="js/db.js"></script>
    <script>
        async function loadHistory() {
            const { data: matches, error } = await _supabase.from('matches').select('*').order('id', { ascending: false });
            const { data: dbPlayers } = await _supabase.from('players').select('name, avatar_url');
            const avatars = new Map((dbPlayers || []).map(player => [player.name, player.avatar_url || '']));
            
            if(error || !matches) {
                document.getElementById('historyList').innerHTML = `<p class="p-6 text-center text-rose-500">Errore nel caricamento dei dati.</p>`;
                return;
            }

            document.getElementById('matchCount').innerText = `${matches.length} match`;

            if(matches.length === 0) {
                document.getElementById('historyList').innerHTML = `<p class="p-6 text-center text-slate-400">Nessuna partita giocata finora.</p>`;
                return;
            }

            document.getElementById('historyList').innerHTML = matches.map(m => {
                const g1Vince = m.s1 > m.s2;
                const p1Avatar = avatars.get(m.p1) || '';
                const p2Avatar = avatars.get(m.p2) || '';
                
                // Formatta la data escludendo l'orario
                const matchDate = new Date(m.created_at).toLocaleDateString('it-IT', {
                    day: '2-digit', month: '2-digit', year: 'numeric'
                });

                return `
                    <div class="p-4 sm:p-6 flex justify-between items-center hover:bg-slate-50/50 transition-colors">
                        <div class="w-2/5 text-left">
                            <a href="player.html?name=${encodeURIComponent(m.p1)}" class="inline-flex items-center gap-2 font-semibold ${g1Vince ? 'text-slate-900 font-bold' : 'text-slate-500'}">
                                ${renderAvatar(p1Avatar, m.p1, 'w-8 h-8')}
                                <span>${m.p1}</span>
                            </a>
                            ${g1Vince ? '👑' : ''}
                        </div>
                        
                        <div class="w-1/5 flex flex-col items-center justify-center gap-1.5">
                            <div class="bg-slate-100 py-1.5 px-3 rounded-lg font-mono font-bold text-slate-700 shadow-inner">
                                ${m.s1} - ${m.s2}
                            </div>
                            <span class="text-[10px] text-slate-400 font-medium tracking-wide whitespace-nowrap">${matchDate}</span>
                        </div>
                        
                        <div class="w-2/5 text-right">
                            ${!g1Vince ? '👑' : ''}
                            <a href="player.html?name=${encodeURIComponent(m.p2)}" class="inline-flex items-center gap-2 justify-end font-semibold ${!g1Vince ? 'text-slate-900 font-bold' : 'text-slate-500'}">
                                <span>${m.p2}</span>
                                ${renderAvatar(p2Avatar, m.p2, 'w-8 h-8')}
                            </a>
                        </div>
                    </div>
                `;
            }).join('');
        }

        initAuthGate().then(session => {
            if (session) {
                loadHistory();
            }
        });
    </script>
</body>
</html>
