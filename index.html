<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OfficePong - Dashboard</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body class="bg-slate-50 text-slate-800 font-sans antialiased min-h-screen" data-page="classifica">

    <nav class="bg-[#0D2745] border-b border-[#1a3a5c] py-4 px-6 sticky top-0 z-10 shadow-md">
        <div class="max-w-5xl mx-auto flex justify-between items-center">
            <a href="index.html" class="text-xl font-bold text-white flex items-center gap-2 no-underline">
                🏓 <span class="text-[#A5D62C]">Office</span>Pong
            </a>
            <div class="flex items-center gap-4 text-sm font-medium">
                <div class="opc-navlinks flex items-center gap-6">
                    <a href="index.html" class="text-[#A5D62C] font-semibold">Classifica</a>
                    <a href="history.html" class="text-slate-400 hover:text-[#A5D62C] transition-colors">Storico Partite</a>
                </div>
                <button onclick="signOut()" class="px-3 py-2 rounded-lg border border-slate-600 text-slate-300 hover:text-rose-400 hover:border-rose-500 hover:bg-rose-500/10 transition-colors">Esci</button>
            </div>
        </div>
    </nav>

    <main class="max-w-5xl mx-auto p-4 md:p-8 grid grid-cols-1 md:grid-cols-3 gap-8">
        <div class="space-y-6 md:col-span-1">
            <div class="bg-white p-6 rounded-2xl border border-slate-200 shadow-xs">
                <h2 class="text-lg font-semibold mb-4 text-slate-900">Registra Partita</h2>
                <div class="space-y-3">
                    <div>
                        <label class="text-xs font-semibold text-slate-500 uppercase">Giocatore 1</label>
                        <input type="text" id="p1Filter" placeholder="Cerca..." autocomplete="off" oninput="filterSelectOpts(this.value,'p1Select')" class="w-full mt-1 px-3 py-2 bg-white border border-slate-200 rounded-lg text-sm focus:outline-hidden">
                        <select id="p1Select" class="w-full mt-1 px-3 py-2 bg-slate-50 border border-slate-200 rounded-lg text-sm"></select>
                    </div>
                    <div>
                        <label class="text-xs font-semibold text-slate-500 uppercase">Giocatore 2</label>
                        <input type="text" id="p2Filter" placeholder="Cerca..." autocomplete="off" oninput="filterSelectOpts(this.value,'p2Select')" class="w-full mt-1 px-3 py-2 bg-white border border-slate-200 rounded-lg text-sm focus:outline-hidden">
                        <select id="p2Select" class="w-full mt-1 px-3 py-2 bg-slate-50 border border-slate-200 rounded-lg text-sm"></select>
                    </div>
                    <div class="grid grid-cols-2 gap-4 pt-2">
                        <div>
                            <label class="text-xs text-slate-500">Punti G1</label>
                            <input type="number" id="p1Score" min="0" value="" class="w-full mt-1 px-3 py-2 bg-slate-50 border border-slate-200 rounded-lg text-center font-bold">
                        </div>
                        <div>
                            <label class="text-xs text-slate-500">Punti G2</label>
                            <input type="number" id="p2Score" min="0" value="" class="w-full mt-1 px-3 py-2 bg-slate-50 border border-slate-200 rounded-lg text-center font-bold">
                        </div>
                    </div>
                    <button onclick="saveMatch()" class="w-full mt-4 bg-[#0D2745] hover:bg-[#1a3a5c] text-white font-bold py-2.5 rounded-lg text-sm cursor-pointer border border-[#1a3a5c]">Salva Match</button>
                </div>
            </div>
        </div>

        <div class="md:col-span-2">
            <div class="bg-white rounded-2xl border border-slate-200 shadow-xs overflow-hidden">
                <div class="p-6 border-b border-slate-100 space-y-4">
                    <h2 class="text-lg font-semibold text-slate-900">Classifica Generale</h2>
                    <div class="grid grid-cols-1 sm:grid-cols-2 gap-3">
                        <label class="text-sm text-slate-600">
                            <span class="block text-xs font-semibold uppercase text-slate-400 mb-1">Ordina per</span>
                            <select id="leaderboardSort" onchange="updateUI()" class="w-full px-3 py-2 bg-slate-50 border border-slate-200 rounded-lg text-sm">
                                <option value="elo">Punti ELO</option>
                                <option value="winRate">Win Rate</option>
                                <option value="points">Punteggio</option> 
                            </select>
                        </label>
                        <label class="text-sm text-slate-600">
                            <span class="block text-xs font-semibold uppercase text-slate-400 mb-1">Soglia minima partite</span>
                            <input id="minMatches" type="number" min="0" value="0" onchange="updateUI()" class="w-full px-3 py-2 bg-slate-50 border border-slate-200 rounded-lg text-sm">
                        </label>
                    </div>
                </div>
                <div class="overflow-x-auto">
                    <table class="w-full text-left border-collapse">
                        <thead>
                            <tr class="bg-slate-50 text-slate-400 text-xs font-semibold uppercase border-b border-slate-100">
                                <th class="py-3 px-1 text-center">Rank</th>
                                <th class="py-3 px-6">Giocatore</th>
                                <th class="py-3 px-4 text-center">PG</th> 
                                <th class="py-3 px-4 text-center">V</th>
                                <th class="py-3 px-4 text-center">S</th>
                                <th class="py-3 px-4 text-center">Punti +/-</th>
                                <th id="dynamicHeader" class="py-3 px-6 text-right">Punti ELO</th>
                            </tr>
                        </thead>
                        <tbody id="leaderboardBody" class="divide-y divide-slate-100 text-sm"></tbody>
                    </table>
                </div>
            </div>
        </div>
    </main>

    <!-- Bottom Navigation -->
    <nav class="opc-bn">
        <a href="index.html" class="opc-bn-tab" data-page="classifica">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><line x1="18" y1="20" x2="18" y2="10"/><line x1="12" y1="20" x2="12" y2="4"/><line x1="6" y1="20" x2="6" y2="14"/></svg>
            <span>Classifica</span>
        </a>
        <a href="history.html" class="opc-bn-tab" data-page="storico">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
            <span>Storico</span>
        </a>
        <button class="opc-bn-fab" onclick="openMatchModal()" aria-label="Nuova partita">
            <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" aria-hidden="true"><path d="M12 5v14M5 12h14"/></svg>
        </button>
        <a href="monthly.html" class="opc-bn-tab" data-page="report">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M6 9H4.5a2.5 2.5 0 010-5H6M18 9h1.5a2.5 2.5 0 000-5H18M4 22h16M10 14.66V17c0 .55-.47.98-.97 1.21C7.85 18.75 7 20.24 7 22M14 14.66V17c0 .55.47.98.97 1.21C16.15 18.75 17 20.24 17 22M18 2H6v7a6 6 0 0012 0V2z"/></svg>
            <span>Report</span>
        </a>
        <button class="opc-bn-tab" onclick="openPlayerModal()" aria-label="Nuovo giocatore">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M16 21v-2a4 4 0 00-4-4H6a4 4 0 00-4 4v2"/><circle cx="9" cy="7" r="4"/><line x1="19" y1="8" x2="19" y2="14"/><line x1="22" y1="11" x2="16" y2="11"/></svg>
            <span>Giocatore</span>
        </button>
    </nav>

    <!-- Player Modal -->
    <div class="opc-overlay" id="_opcPOverlay" onclick="closePlayerModal()"></div>
    <div class="opc-modal" id="_opcPModal" role="dialog" aria-modal="true">
        <div class="opc-modal-handle"></div>
        <div class="opc-modal-head">
            <h2 class="opc-modal-title">👤 Nuovo Giocatore</h2>
            <button class="opc-modal-close" onclick="closePlayerModal()" aria-label="Chiudi">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><path d="M18 6L6 18M6 6l12 12"/></svg>
            </button>
        </div>
        <div class="opc-modal-body">
            <div class="flex flex-col items-center gap-1">
                <div class="relative cursor-pointer group" onclick="document.getElementById('_pModalFile').click()" title="Scegli foto">
                    <div id="_pModalAvatarPreview" class="w-20 h-20 rounded-full bg-slate-100 border-2 border-dashed border-slate-200 flex items-center justify-center text-3xl overflow-hidden">👤</div>
                    <div class="absolute inset-0 rounded-full bg-black/0 group-hover:bg-black/35 transition-all flex items-center justify-center pointer-events-none">
                        <svg class="w-5 h-5 text-white opacity-0 group-hover:opacity-100 transition-opacity" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M3 9a2 2 0 012-2h.93a2 2 0 001.664-.89l.812-1.22A2 2 0 0110.07 4h3.86a2 2 0 011.664.89l.812 1.22A2 2 0 0018.07 7H19a2 2 0 012 2v9a2 2 0 01-2 2H5a2 2 0 01-2-2V9z"/><path stroke-linecap="round" stroke-linejoin="round" d="M15 13a3 3 0 11-6 0 3 3 0 016 0z"/></svg>
                    </div>
                </div>
                <p class="text-xs text-slate-400">Tocca per aggiungere foto</p>
            </div>
            <input type="file" id="_pModalFile" accept="image/*" class="hidden">
            <input type="text"  id="_pModalName" placeholder="Nome giocatore"          class="opc-modal-input" autocomplete="off">
            <input type="url"   id="_pModalUrl"  placeholder="oppure incolla URL avatar…" class="opc-modal-input">
            <button class="opc-modal-save" onclick="saveNewPlayer()">Aggiungi Giocatore</button>
        </div>
    </div>

    <!-- Match Modal -->
    <div class="opc-overlay" id="_opcOverlay" onclick="closeMatchModal()"></div>
    <div class="opc-modal" id="_opcModal" role="dialog" aria-modal="true" aria-labelledby="_opcModalTitle">
        <div class="opc-modal-handle"></div>
        <div class="opc-modal-head">
            <h2 class="opc-modal-title" id="_opcModalTitle">🏓 Nuova Partita</h2>
            <button class="opc-modal-close" onclick="closeMatchModal()" aria-label="Chiudi">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><path d="M18 6L6 18M6 6l12 12"/></svg>
            </button>
        </div>
        <div class="opc-modal-body">
            <div class="opc-modal-selects">
                <div class="opc-modal-field">
                    <label for="_modalP1">Giocatore 1</label>
                    <select id="_modalP1"><option value="" disabled selected>Caricamento...</option></select>
                </div>
                <div class="opc-modal-field">
                    <label for="_modalP2">Giocatore 2</label>
                    <select id="_modalP2"><option value="" disabled selected>Caricamento...</option></select>
                </div>
            </div>
            <div class="opc-scores">
                <div class="opc-score-block">
                    <div class="opc-score-ctrl">
                        <button class="opc-score-btn opc-score-minus" onclick="changeScore(1,-1)" aria-label="Diminuisci">−</button>
                        <input type="number" class="opc-score-num" id="_modalS1" value="0" min="0" inputmode="numeric" onfocus="this.select()" aria-label="Punteggio giocatore 1">
                        <button class="opc-score-btn opc-score-plus" onclick="changeScore(1,1)" aria-label="Aumenta">+</button>
                    </div>
                </div>
                <div class="opc-score-sep">vs</div>
                <div class="opc-score-block">
                    <div class="opc-score-ctrl">
                        <button class="opc-score-btn opc-score-minus" onclick="changeScore(2,-1)" aria-label="Diminuisci">−</button>
                        <input type="number" class="opc-score-num" id="_modalS2" value="0" min="0" inputmode="numeric" onfocus="this.select()" aria-label="Punteggio giocatore 2">
                        <button class="opc-score-btn opc-score-plus" onclick="changeScore(2,1)" aria-label="Aumenta">+</button>
                    </div>
                </div>
            </div>
            <button class="opc-modal-save" id="_modalSaveBtn" onclick="saveModalMatch()">Salva Partita</button>
        </div>
    </div>

    <script src="js/db.js"></script>
    <script>
        let selectedAvatarFile = null;

        function filterSelectOpts(val, selectId) {
            var sel = document.getElementById(selectId);
            if (!sel) return;
            var v = val.toLowerCase().trim();
            Array.from(sel.options).forEach(function (o) {
                o.hidden = !!v && !!o.value && !o.text.toLowerCase().includes(v);
            });
        }

        let _uiRetry = 0;
        async function updateUI() {
            // show skeleton while fetching
            const tbody = document.getElementById('leaderboardBody');
            if (tbody && !tbody.querySelector('tr[data-loaded]')) {
                tbody.innerHTML = `<tr><td colspan="7" class="py-8 text-center text-slate-400 text-sm">Caricamento classifica…</td></tr>`;
            }

            // wrap in try/catch: Supabase can throw on cold-start / timeout
            let dbPlayers, dbMatches;
            try {
                const [r1, r2] = await Promise.all([
                    _supabase.from('players').select('*'),
                    _supabase.from('matches').select('*').order('id', { ascending: true })
                ]);
                if (r1.error || r2.error || r1.data === null || r2.data === null) throw new Error('fetch_failed');
                dbPlayers = r1.data;
                dbMatches = r2.data;
            } catch (_) {
                if (_uiRetry++ < 5) setTimeout(updateUI, 2000);
                return;
            }

            // Supabase free-tier cold start can return data:[] with no error —
            // retry if we get 0 players but localStorage says we had some before
            if (dbPlayers.length === 0 && localStorage.getItem('opc_has_players') && _uiRetry++ < 3) {
                setTimeout(updateUI, 2000);
                return;
            }
            _uiRetry = 0;
            if (dbPlayers.length > 0) localStorage.setItem('opc_has_players', '1');

            const players = dbPlayers;
            const matches = dbMatches;
            const sortMode = document.getElementById('leaderboardSort')?.value || 'elo';
            const minMatches = Math.max(parseInt(document.getElementById('minMatches')?.value || '0', 10) || 0, 0);
            
            const p1Sel = document.getElementById('p1Select');
            const p2Sel = document.getElementById('p2Select');

            // Inseriamo una scelta finta e disabilitata come prima opzione
            p1Sel.innerHTML = '<option value="" disabled selected>...</option>';
            p2Sel.innerHTML = '<option value="" disabled selected>...</option>';

            players.forEach(p => {
                p1Sel.innerHTML += `<option value="${p.name}">${p.name}</option>`;
                p2Sel.innerHTML += `<option value="${p.name}">${p.name}</option>`;
            });

            let stats = {};
            // Ogni giocatore parte con 1000 punti ELO di base
            players.forEach(p => stats[p.name] = { elo: 1000, v: 0, s: 0, fatti: 0, subiti: 0, avatar_url: p.avatar_url || '' });

            matches.forEach(m => {
                if(!stats[m.p1] || !stats[m.p2]) return;
                
                // Statistiche base (punti e V/S)
                stats[m.p1].fatti += m.s1; stats[m.p1].subiti += m.s2;
                stats[m.p2].fatti += m.s2; stats[m.p2].subiti += m.s1;
                
                const p1Vince = m.s1 > m.s2;
                if(p1Vince) { stats[m.p1].v++; stats[m.p2].s++; }
                else { stats[m.p2].v++; stats[m.p1].s++; }

                // --- ALGORITMO ELO UFFICIALE ---
                const r1 = stats[m.p1].elo;
                const r2 = stats[m.p2].elo;

                // Calcolo della probabilità di vittoria attesa per entrambi
                const e1 = 1 / (1 + Math.pow(10, (r2 - r1) / 400));
                const e2 = 1 / (1 + Math.pow(10, (r1 - r2) / 400));

                // Risultato reale (1 = Vittoria, 0 = Sconfitta)
                const outcome1 = p1Vince ? 1 : 0;
                const outcome2 = p1Vince ? 0 : 1;

                // Il K-Factor determina quanti punti si muovono al massimo a partita (32 è lo standard)
                const K = 32;

                // Aggiornamento dei punti ELO nel tempo
                stats[m.p1].elo = Math.round(r1 + K * (outcome1 - e1));
                stats[m.p2].elo = Math.round(r2 + K * (outcome2 - e2));
            });

            // Generiamo la classifica ordinando direttamente per i punti ELO
            // Generiamo la classifica ordinando direttamente per i punti ELO o altri criteri
            let ranked = players.map(p => {
                const total = stats[p.name].v + stats[p.name].s;
                const rate = total > 0 ? Math.round((stats[p.name].v / total) * 100) : 0;
                const diff = stats[p.name].fatti - stats[p.name].subiti;
                const simplePoints = stats[p.name].v; // 1 punto a vittoria = totale vittorie!
                return { name: p.name, ...stats[p.name], rate, total, diff, simplePoints };
            }).filter(p => p.total >= minMatches).sort((a,b) => {
                // Se ordiniamo per Punti Classici
                if (sortMode === 'points') {
                    return b.simplePoints - a.simplePoints || b.elo - a.elo || b.diff - a.diff;
                }
                // Se ordiniamo per Win Rate
                if (sortMode === 'winRate') {
                    return b.rate - a.rate || b.elo - a.elo || b.diff - a.diff;
                }
                // Di base ordiniamo per ELO
                return b.elo - a.elo || b.rate - a.rate || b.total - a.total;
            });

            // 1. Cambia il testo del TH in base al filtro selezionato
            const dynamicHeader = document.getElementById('dynamicHeader');
            if (sortMode === 'winRate') {
                dynamicHeader.innerText = "Win Rate";
            } else if (sortMode === 'points') {
                dynamicHeader.innerText = "Punteggio"; // <-- Aggiornato
            } else {
                dynamicHeader.innerText = "Punti ELO";
            }

            // Streak attuale per ciascun giocatore
            const streaks = {};
            players.forEach(pl => {
                const pMatches = matches.filter(m => m.p1 === pl.name || m.p2 === pl.name).reverse();
                if (!pMatches.length) { streaks[pl.name] = { count: 0, win: true }; return; }
                const firstWin = pMatches[0].p1 === pl.name ? pMatches[0].s1 > pMatches[0].s2 : pMatches[0].s2 > pMatches[0].s1;
                let cnt = 0;
                for (const m of pMatches) {
                    const won = m.p1 === pl.name ? m.s1 > m.s2 : m.s2 > m.s1;
                    if (won === firstWin) cnt++; else break;
                }
                streaks[pl.name] = { count: cnt, win: firstWin };
            });

            // Genera le righe della tabella
            const rankMedals = ['🥇', '🥈', '🥉'];
            document.getElementById('leaderboardBody').innerHTML = ranked.map((p, idx) => {
                let displayValue = "";
                if (sortMode === 'winRate') {
                    displayValue = `${p.rate}%`;
                } else if (sortMode === 'points') {
                    displayValue = `${p.simplePoints} pt`;
                } else {
                    displayValue = `${p.elo} pts`;
                }

                const medal = idx < rankMedals.length ? `<span class="shrink-0 text-base">${rankMedals[idx]}</span>` : '';
                const sk = streaks[p.name] || { count: 0, win: true };
                const streakBadge = sk.count >= 2
                    ? (sk.win
                        ? `<span class="text-[11px] font-bold text-emerald-700 bg-emerald-50 px-1.5 py-0.5 rounded-md shrink-0">🔥${sk.count}</span>`
                        : `<span class="text-[11px] font-bold text-slate-500 bg-slate-100 px-1.5 py-0.5 rounded-md shrink-0">❄️${sk.count}</span>`)
                    : '';

                return `
                    <tr class="hover:bg-slate-50/70" data-loaded="1">
                        <td class="py-4 px-2 font-medium">
                            ${medal}
                        </td>
                        <td class="py-4 px-6 font-medium">
                            <div class="flex items-center gap-3">
                                ${renderAvatar(p.avatar_url, p.name, 'w-9 h-9')}
                                <div class="flex items-center gap-1.5 min-w-0">
                                    <a href="player.html?name=${encodeURIComponent(p.name)}" class="text-emerald-600 hover:underline truncate">${p.name}</a>
                                    ${streakBadge}
                                </div>
                            </div>
                        </td>
                        <td class="py-4 px-4 text-center font-medium text-slate-500">${p.total}</td>
                        <td class="py-4 px-4 text-center font-semibold text-emerald-600">${p.v}</td> 
                        <td class="py-4 px-4 text-center font-semibold text-rose-500">${p.s}</td>
                        <td class="py-4 px-4 text-center text-slate-500">${p.fatti}:${p.subiti}</td>
                        <td class="py-4 px-6 text-right font-bold text-emerald-600">${displayValue}</td>
                    </tr>
                `;
            }).join('');
        }

        document.getElementById('playerAvatarFile')?.addEventListener('change', event => {
            const file = event.target.files?.[0];
            selectedAvatarFile = file || null;

            if (!file) return;

            const previewUrl = URL.createObjectURL(file);
            document.getElementById('avatarPreview').innerHTML = `
                <img
                    src="${previewUrl}"
                    alt="Anteprima avatar"
                    class="w-12 h-12 rounded-full object-cover border border-slate-200 bg-white shrink-0"
                >
            `;
        });

        async function addPlayer() {
            const name = document.getElementById('playerName').value.trim();
            const avatarUrl = document.getElementById('playerAvatar').value.trim();
            if(name) {
                let finalAvatarUrl = avatarUrl || null;

                if (selectedAvatarFile) {
                    try {
                        finalAvatarUrl = await uploadAvatarFile(name, selectedAvatarFile);
                    } catch (error) {
                        console.error('Errore upload avatar:', error);
                        alert('Impossibile caricare l\'immagine. Controlla che il bucket Storage sia configurato correttamente.');
                        return;
                    }
                }

                await _supabase.from('players').insert([{ name, avatar_url: finalAvatarUrl }]);
                document.getElementById('playerName').value = "";
                document.getElementById('playerAvatar').value = "";
                document.getElementById('playerAvatarFile').value = "";
                document.getElementById('avatarPreview').innerHTML = '👤';
                selectedAvatarFile = null;
                updateUI();
            }
        }

        async function saveMatch() {
            const p1 = document.getElementById('p1Select').value;
            const p2 = document.getElementById('p2Select').value;
            const s1 = parseInt(document.getElementById('p1Score').value, 10);
            const s2 = parseInt(document.getElementById('p2Score').value, 10);

            // Controllo di sicurezza: blocca se i campi sono vuoti (NaN) o se i dati sono uguali
            if(p1 === p2 || isNaN(s1) || isNaN(s2) || s1 === s2) {
                return alert("Controlla i dati inseriti! Assicurati di aver inserito entrambi i punteggi e che non ci sia un pareggio.");
            }

            await _supabase.from('matches').insert([{ p1, p2, s1, s2 }]);
            document.getElementById('p1Score').value = "";
            document.getElementById('p2Score').value = "";
            updateUI();
        }

        initAuthGate().then(session => {
            if (session) {
                updateUI();
                document.addEventListener('visibilitychange', () => {
                    if (document.visibilityState === 'visible') updateUI();
                });
            }
        });
    </script>
</body>
