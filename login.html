<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OfficePong - Accesso</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { background: #091D35; }

        .login-bg {
            position: fixed; inset: 0; overflow: hidden; pointer-events: none;
        }
        .glow {
            position: absolute; border-radius: 50%; filter: blur(80px); opacity: 0.18;
        }
        .glow-lime  { width: 480px; height: 480px; background: #A5D62C; top: -120px; left: -100px; }
        .glow-teal  { width: 520px; height: 520px; background: #0891B2; bottom: -140px; right: -120px; }
        .glow-navy  { width: 340px; height: 340px; background: #1a3a5c; top: 40%; left: 55%; }

        .login-card {
            background: rgba(13, 39, 69, 0.85);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(165, 214, 44, 0.18);
            border-radius: 24px;
            box-shadow: 0 32px 64px rgba(0,0,0,0.4), 0 0 0 1px rgba(255,255,255,0.04) inset;
        }

        .brand-pill {
            display: inline-flex; align-items: center; gap: 8px;
            background: rgba(255,255,255,0.06);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 100px;
            padding: 5px 14px;
            font-size: 11px; font-weight: 600; letter-spacing: 0.06em;
            color: rgba(255,255,255,0.55);
        }
        .brand-pill span.dot { width: 3px; height: 3px; background: rgba(255,255,255,0.3); border-radius: 50%; }

        .login-input {
            width: 100%; padding: 13px 16px;
            background: rgba(255,255,255,0.07);
            border: 1.5px solid rgba(255,255,255,0.12);
            border-radius: 12px;
            color: #f1f5f9; font-size: 15px;
            outline: none; transition: border-color 0.2s, background 0.2s;
        }
        .login-input::placeholder { color: rgba(255,255,255,0.3); }
        .login-input:focus { border-color: #A5D62C; background: rgba(255,255,255,0.1); }

        .login-btn {
            width: 100%; padding: 14px;
            background: #A5D62C; color: #0D2745;
            border: none; border-radius: 14px;
            font-size: 15px; font-weight: 800; letter-spacing: 0.01em;
            cursor: pointer; transition: background 0.15s, transform 0.1s;
        }
        .login-btn:hover { background: #8FBB1E; }
        .login-btn:active { transform: scale(0.98); }

        .opc-logo-mark {
            width: 52px; height: 52px; border-radius: 16px;
            background: linear-gradient(135deg, #A5D62C 0%, #5c9900 100%);
            display: flex; align-items: center; justify-content: center;
            font-size: 26px;
            box-shadow: 0 8px 24px rgba(165,214,44,0.35);
        }
    </style>
</head>
<body class="min-h-screen text-slate-100 antialiased flex items-center justify-center px-4 py-10">

    <div class="login-bg">
        <div class="glow glow-lime"></div>
        <div class="glow glow-teal"></div>
        <div class="glow glow-navy"></div>
    </div>

    <section class="relative w-full max-w-md">
        <div class="login-card p-8 md:p-10">

            <!-- Co-branding -->
            <div class="flex justify-center mb-8">
                <div class="brand-pill">
                    <span>GBS Web</span>
                    <span class="dot"></span>
                    <span>Aionsoft</span>
                </div>
            </div>

            <!-- Logo + Title -->
            <div class="flex items-center gap-4 mb-8">
                <div class="opc-logo-mark">🏓</div>
                <div>
                    <h1 class="text-3xl font-extrabold tracking-tight">
                        <span class="text-[#A5D62C]">Office</span><span class="text-white">Pong</span>
                    </h1>
                    <p class="text-sm text-slate-400 mt-0.5">Accesso riservato ai membri</p>
                </div>
            </div>

            <form id="loginForm" class="space-y-4">
                <div>
                    <label for="password" class="block text-xs font-bold uppercase tracking-widest text-slate-400 mb-2">Password</label>
                    <input id="password" type="password" required class="login-input" placeholder="••••••••" autocomplete="current-password">
                </div>
                <button type="submit" class="login-btn">Entra</button>
            </form>

            <p id="loginStatus" class="mt-4 text-sm text-center text-slate-400 min-h-5"></p>

        </div>

        <!-- Footer credits -->
        <p class="text-center text-[11px] text-slate-600 mt-6 tracking-wide">
            Sviluppato da <span class="text-slate-500 font-semibold">GBS Web</span> &amp; <span class="text-slate-500 font-semibold">Aionsoft</span>
        </p>
    </section>

    <script src="js/db.js"></script>
    <script>
        if (window.localStorage.getItem(OFFICEPONG_ACCESS_KEY) === 'true') {
            window.location.href = 'index.html';
        }

        document.getElementById('loginForm').addEventListener('submit', async event => {
            event.preventDefault();

            const password = document.getElementById('password').value;
            const status = document.getElementById('loginStatus');

            status.textContent = 'Accesso in corso...';

            const role = window.verifyAppPassword(password);
            if (!role) {
                status.textContent = 'Password errata.';
                return;
            }

            window.localStorage.setItem(OFFICEPONG_ACCESS_KEY, 'true');
            window.localStorage.setItem(OFFICEPONG_ROLE_KEY, role);

            window.location.href = 'index.html';
        });
    </script>
</body>
</html>
