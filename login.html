<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OfficePong - Accesso</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body class="min-h-screen bg-slate-950 text-slate-100 antialiased">
    <main class="min-h-screen flex items-center justify-center px-4 py-10">
        <div class="absolute inset-0 overflow-hidden pointer-events-none">
            <div class="absolute -top-24 -left-24 w-80 h-80 rounded-full bg-emerald-500/20 blur-3xl"></div>
            <div class="absolute top-1/3 -right-24 w-96 h-96 rounded-full bg-cyan-500/15 blur-3xl"></div>
            <div class="absolute bottom-0 left-1/3 w-72 h-72 rounded-full bg-slate-500/10 blur-3xl"></div>
        </div>

        <section class="relative w-full max-w-md">
            <div class="bg-slate-900/90 backdrop-blur-xl border border-white/10 rounded-3xl shadow-2xl shadow-black/30 p-8 md:p-10">
                <div class="flex items-center gap-3 mb-8">
                    <div class="w-12 h-12 rounded-2xl bg-emerald-500 flex items-center justify-center text-2xl shadow-lg shadow-emerald-500/30">🏓</div>
                    <div>
                        <p class="text-sm uppercase tracking-[0.3em] text-slate-400">OfficePong</p>
                        <h1 class="text-3xl font-bold text-white">Accesso protetto</h1>
                    </div>
                </div>

                <p class="text-sm text-slate-300 mb-6 leading-6">
                    Inserisci la password condivisa per accedere alla piattaforma.
                </p>

                <form id="loginForm" class="space-y-4">
                    <div>
                        <label for="password" class="block text-xs font-semibold uppercase tracking-wide text-slate-400 mb-2">Password</label>
                        <input id="password" type="password" required class="w-full px-4 py-3 rounded-xl bg-slate-800 border border-slate-700 text-slate-100 placeholder:text-slate-500 focus:outline-none focus:ring-2 focus:ring-emerald-500" placeholder="••••••••">
                    </div>
                    <button type="submit" class="w-full rounded-xl bg-emerald-500 text-slate-950 font-bold py-3 hover:bg-emerald-400 transition-colors">Entra</button>
                </form>

                <p id="loginStatus" class="mt-4 text-sm text-slate-400 min-h-5"></p>
            </div>
        </section>
    </main>

    <script src="js/db.js"></script>
    <script>
        if (window.localStorage.getItem(OFFICEPONG_ACCESS_KEY) === 'true') {
            window.location.href = 'index.html';
        }

        document.getElementById('loginForm').addEventListener('submit', async event => {
            event.preventDefault();

            const password = document.getElementById('password').value;
            const status = document.getElementById('loginStatus');

            status.textContent = 'Accesso in corso...';

            if (!window.verifyAppPassword(password)) {
                status.textContent = 'Password errata.';
                return;
            }

            window.localStorage.setItem(OFFICEPONG_ACCESS_KEY, 'true');

            window.location.href = 'index.html';
        });
    </script>
</body>
</html>
